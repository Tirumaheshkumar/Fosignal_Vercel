<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FO Signals — Live Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;--bg4:#1c1c28;
  --line:#1e1e2e;--line2:#252535;
  --green:#00d97e;--red:#ff4560;--blue:#3b82f6;--yellow:#f59e0b;
  --t1:#ffffff;--t2:#a0a0b8;--t3:#52526a;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--disp:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t2);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:900;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.lw{width:400px;padding:44px 40px;background:var(--bg2);border:1px solid var(--line2);border-radius:20px;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.lmark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:15px;font-weight:800;color:#000;margin-bottom:22px;}
.ltitle{font-family:var(--disp);font-size:26px;font-weight:800;color:var(--t1);margin-bottom:4px;}
.lsub{font-size:11px;color:var(--t3);margin-bottom:28px;letter-spacing:.3px;}
.lbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--green);color:#000;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.lbtn:hover{opacity:.85;}
.lnote{font-size:10px;color:var(--t3);line-height:1.7;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}

/* HEADER */
.hdr{height:50px;min-height:50px;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;}
.hlogo{display:flex;align-items:center;gap:9px;}
.hmark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:10px;font-weight:800;color:#000;}
.hname{font-family:var(--disp);font-size:15px;font-weight:800;color:var(--t1);}
.hname span{color:var(--green);}
.hright{display:flex;align-items:center;gap:10px;}
.hpill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--line);font-size:9px;font-family:var(--mono);}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--t3);}
.hdot.live{background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#hclock{font-family:var(--mono);font-size:11px;color:var(--t1);}
.hbtn{background:transparent;border:1px solid var(--line2);color:var(--t3);padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .12s;}
.hbtn:hover{color:var(--t2);}
.mkbadge{font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:3px;}
.mkbadge.open{background:rgba(0,217,126,.1);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.mkbadge.closed{background:var(--bg3);color:var(--t3);border:1px solid var(--line);}

/* SHELL */
.shell{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* MODE NAV */
.modenav{padding:8px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg2);}
.modeBtn{padding:6px 18px;border-radius:7px;border:1px solid var(--line2);background:transparent;color:var(--t3);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;}
.modeBtn.active{background:var(--green);color:#000;border-color:var(--green);}
.modeBtn:hover:not(.active){color:var(--t2);}
.msep{width:1px;height:18px;background:var(--line2);margin:0 2px;}
.submode{display:none;align-items:center;gap:4px;}
.subBtn{padding:4px 12px;border-radius:5px;border:1px solid var(--line);background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--sans);}
.subBtn.active{background:var(--bg4);color:var(--t1);border-color:var(--line2);}
.subBtn:hover:not(.active){color:var(--t2);}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;}

/* LEFT */
.lp{width:268px;min-width:268px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.lpsec{padding:12px 14px 10px;border-bottom:1px solid var(--line);flex-shrink:0;}
.lpsect{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}
.budrow{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
.budinp{flex:1;background:var(--bg3);border:1px solid var(--line2);border-radius:6px;padding:6px 9px;font-family:var(--mono);font-size:11px;color:var(--t1);outline:none;transition:border-color .12s;}
.budinp:focus{border-color:var(--blue);}
.budlbl{font-size:10px;color:var(--t3);}
.rngrow{margin-bottom:8px;}
.rnglbls{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px;}
input[type=range]{width:100%;accent-color:var(--green);height:3px;cursor:pointer;}
.perfrow{display:flex;gap:4px;}
.pchip{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:500;border:1px solid var(--line2);background:transparent;color:var(--t3);cursor:pointer;transition:all .1s;font-family:var(--sans);}
.pchip.g.on{background:rgba(0,217,126,.09);color:var(--green);border-color:rgba(0,217,126,.22);}
.pchip.r.on{background:rgba(255,69,96,.07);color:var(--red);border-color:rgba(255,69,96,.18);}
.pchip.a.on{background:var(--bg4);color:var(--t1);border-color:var(--line2);}
.pchip:hover{color:var(--t2);}

.top5hdr{padding:8px 14px 5px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);flex-shrink:0;}
.top5{flex:1;overflow-y:auto;padding:0 10px 8px;}
.t5i{padding:9px 10px;border-radius:8px;margin-bottom:4px;border:1px solid var(--line);background:var(--bg3);cursor:pointer;transition:all .12s;}
.t5i:hover,.t5i.sel{background:var(--bg4);border-color:var(--line2);}
.t5i.sel{border-color:var(--green) !important;}
.t5top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.t5sym{font-family:var(--disp);font-size:12px;font-weight:700;color:var(--t1);}
.t5sig{font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;}
.t5sig.b{background:rgba(0,217,126,.1);color:var(--green);}
.t5sig.s{background:rgba(255,69,96,.08);color:var(--red);}
.t5sig.n{background:rgba(245,158,11,.07);color:var(--yellow);}
.t5nm{font-size:9px;color:var(--t3);margin-bottom:4px;}
.t5row{display:flex;justify-content:space-between;font-size:9px;}
.t5ltp{color:var(--t1);font-family:var(--mono);}
.t5up{color:var(--green);}.t5dn{color:var(--red);}
.t5cf{color:var(--t3);}
.t5bar{height:2px;background:var(--line);border-radius:1px;margin-top:4px;overflow:hidden;}
.t5fill{height:100%;border-radius:1px;transition:width .7s;}

.wpill{padding:11px 14px;border-top:1px solid var(--line);flex-shrink:0;background:var(--bg3);}
.wpill-lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.wqp{display:inline-block;font-size:8px;font-weight:700;letter-spacing:.8px;padding:1px 6px;border-radius:3px;margin-bottom:3px;}
.wqp.PRIME{background:rgba(0,217,126,.1);color:var(--green);}
.wqp.GOOD{background:rgba(245,158,11,.07);color:var(--yellow);}
.wqp.AVOID{background:rgba(255,69,96,.07);color:var(--red);}
.wqp.CAUTION{background:rgba(59,130,246,.07);color:var(--blue);}
.wpill-name{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:1px;}
.wpill-time{font-size:9px;font-family:var(--mono);color:var(--t3);margin-bottom:4px;}
.wpill-tip{font-size:9px;color:var(--t3);line-height:1.5;}

/* CENTER */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ctabs{padding:8px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:4px;flex-shrink:0;}
.stab{padding:4px 11px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:4px;font-family:var(--sans);}
.stab.on{background:var(--bg3);border-color:var(--line2);color:var(--t1);}
.stab:hover:not(.on){color:var(--t2);}
.sdot{width:5px;height:5px;border-radius:50%;}
.scnt{font-size:8px;padding:1px 4px;border-radius:2px;}
.scnt.g{background:rgba(0,217,126,.1);color:var(--green);}
.scnt.r{background:rgba(255,69,96,.07);color:var(--red);}
.scnt.y{background:rgba(245,158,11,.07);color:var(--yellow);}
.sync{margin-left:auto;font-size:9px;color:var(--t3);font-family:var(--mono);}

.cscroll{flex:1;overflow-y:auto;padding:10px 12px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:9px;}

/* SIGNAL CARD */
.scard{background:var(--bg2);border:1px solid var(--line);border-radius:11px;overflow:hidden;cursor:pointer;transition:border-color .12s,transform .12s;animation:fup .3s ease both;}
@keyframes fup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.scard:hover{border-color:var(--line2);transform:translateY(-1px);}
.scard.sel{border-color:var(--green);}
.scard.fb{animation:fb .45s;}
.scard.fs{animation:fs .45s;}
@keyframes fb{0%{box-shadow:0 0 12px rgba(0,217,126,.28)}100%{box-shadow:none}}
@keyframes fs{0%{box-shadow:0 0 12px rgba(255,69,96,.25)}100%{box-shadow:none}}

.sc-top{padding:9px 11px;display:flex;justify-content:space-between;align-items:flex-start;}
.sc-sym{font-family:var(--disp);font-size:14px;font-weight:800;color:var(--t1);}
.sc-nm{font-size:9px;color:var(--t3);margin-top:1px;}
.sc-ltp{font-family:var(--mono);font-size:13px;color:var(--t1);text-align:right;}
.sc-chg{font-size:9px;text-align:right;margin-top:1px;}
.sc-chg.up{color:var(--green);}.sc-chg.dn{color:var(--red);}
.sc-mid{padding:0 11px 7px;display:flex;align-items:center;justify-content:space-between;}
.sc-bias{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;}
.sc-bias.bull{background:rgba(0,217,126,.09);color:var(--green);}
.sc-bias.bear{background:rgba(255,69,96,.07);color:var(--red);}
.sc-bias.side{background:rgba(245,158,11,.06);color:var(--yellow);}
.sc-inds{display:flex;gap:3px;align-items:center;}
.sc-ind{width:5px;height:5px;border-radius:50%;}
.sc-body{padding:7px 11px 10px;border-top:1px solid var(--line);}
.sc-blk{border-radius:6px;padding:8px 9px;margin-bottom:5px;}
.sc-blk.buy{background:rgba(0,217,126,.03);border:1px solid rgba(0,217,126,.12);}
.sc-blk.sell{background:rgba(255,69,96,.03);border:1px solid rgba(255,69,96,.1);}
.sc-bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sc-bt{font-size:9px;font-weight:700;}
.sc-bt.buy{color:var(--green);}.sc-bt.sell{color:var(--red);}
.sc-or{font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;}
.sc-or.call{background:rgba(0,217,126,.1);color:var(--green);}
.sc-or.put{background:rgba(255,69,96,.08);color:var(--red);}
.sc-r{display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px;}
.sc-rl{color:var(--t3);}.sc-rv{color:var(--t1);font-family:var(--mono);}
.sc-rv.g{color:var(--green);}.sc-rv.r{color:var(--red);}
.sc-cf{margin-top:6px;}
.sc-cfh{display:flex;justify-content:space-between;font-size:8px;margin-bottom:2px;color:var(--t3);}
.sc-cfbar{height:2px;background:var(--line);border-radius:1px;overflow:hidden;}
.sc-cffill{height:100%;border-radius:1px;transition:width .8s;}
.sc-cffill.hi{background:var(--green);}.sc-cffill.md{background:var(--yellow);}.sc-cffill.lo{background:var(--red);}
.sc-mini{display:flex;justify-content:space-between;margin-top:5px;font-size:8px;color:var(--t3);}
.sc-trap{margin-top:5px;padding:4px 7px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:4px;font-size:8px;color:rgba(245,158,11,.75);line-height:1.5;}

/* RIGHT DETAIL */
.rp{width:0;min-width:0;background:var(--bg2);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width .18s ease,min-width .18s ease;}
.rp.open{width:288px;min-width:288px;}
.rscroll{flex:1;overflow-y:auto;padding:14px 14px 20px;}
.rph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.rpt{font-family:var(--disp);font-size:17px;font-weight:800;color:var(--t1);}
.rpnm{font-size:9px;color:var(--t3);margin-top:2px;}
.rpx{background:transparent;border:1px solid var(--line2);color:var(--t3);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rpx:hover{color:var(--t1);}
.rpblock{background:var(--bg3);border-radius:9px;padding:12px;margin-bottom:8px;}
.rpblkh{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;}
.gsc{font-family:var(--disp);font-size:28px;font-weight:800;color:var(--t1);text-align:center;}
.glbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-align:center;margin-top:2px;}
.grow{display:flex;justify-content:center;gap:14px;margin-top:10px;}
.gri{display:flex;flex-direction:column;align-items:center;gap:1px;}
.gril{font-size:8px;color:var(--t3);}.griv{font-size:10px;font-weight:600;color:var(--t1);}
.krow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:10px;}
.krow:last-child{border:none;}
.kn{color:var(--t2);}.kv{font-weight:600;font-family:var(--mono);font-size:9px;}
.kv.bull{color:var(--green);}.kv.bear{color:var(--red);}.kv.neu{color:var(--yellow);}
.drow{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;}
.drl{color:var(--t3);}.drv{color:var(--t1);font-family:var(--mono);font-size:9px;}
.drv.g{color:var(--green);}.drv.r{color:var(--red);}
.wslog{background:var(--bg);border-radius:6px;padding:7px;height:65px;overflow-y:auto;font-size:8px;line-height:1.8;font-family:var(--mono);}
.wsl{display:flex;gap:5px;}
.wslt{color:var(--t3);flex-shrink:0;}
.wslm.i{color:var(--blue);}.wslm.s{color:var(--green);}.wslm.w{color:var(--yellow);}.wslm.e{color:var(--red);}.wslm.d{color:var(--t3);}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--t3);}
.empty-ico{font-size:28px;opacity:.3;}
.empty-txt{font-size:11px;}

/* ALERTS */
#alerts{position:fixed;top:56px;right:12px;z-index:800;display:flex;flex-direction:column;gap:5px;max-width:240px;}
.toast{background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;font-size:10px;line-height:1.5;animation:tin .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.5);}
@keyframes tin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.toast.buy{border-left:3px solid var(--green);}
.toast.sell{border-left:3px solid var(--red);}
.tth{font-weight:700;color:var(--t1);margin-bottom:1px;}
</style>
</head>
<body>

<div id="alerts"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lw">
    <div class="lmark">FO</div>
    <div class="ltitle">FO Signals</div>
    <div class="lsub">Live F&O · MCX · Currency Terminal</div>
    <button class="lbtn" onclick="loginUpstox()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#000" stroke-width="2" stroke-linejoin="round"/></svg>
      Login with Upstox
    </button>
    <div class="lnote">Token expires daily at midnight IST. Your API secret is handled server-side and never exposed in the browser.</div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hlogo">
    <div class="hmark">FO</div>
    <div class="hname">FO <span>Signals</span></div>
  </div>
  <div class="hright">
    <div class="hpill"><div class="hdot" id="wsdot"></div><span id="wstxt" style="color:var(--t3);font-size:9px">OFFLINE</span></div>
    <span id="nsebadge" class="mkbadge closed">NSE</span>
    <span id="mcxbadge" class="mkbadge closed">MCX</span>
    <span id="hclock" style="font-family:var(--mono);font-size:11px;color:var(--t1)">--:--:--</span>
    <button class="hbtn" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- SHELL -->
<div class="shell">
  <!-- MODE NAV -->
  <div class="modenav">
    <button class="modeBtn active" id="btnS" onclick="setMode('stocks')">Stocks</button>
    <button class="modeBtn" id="btnF" onclick="setMode('fo')">F&O</button>
    <div class="msep"></div>
    <div class="submode" id="foSub">
      <button class="subBtn active" id="sbEq"  onclick="setFOSub('eq')">Equities</button>
      <button class="subBtn" id="sbCom" onclick="setFOSub('com')">Commodities</button>
      <button class="subBtn" id="sbFut" onclick="setFOSub('fut')">Stock Futures</button>
    </div>
  </div>

  <div class="main">
    <!-- LEFT -->
    <div class="lp">
      <div class="lpsec">
        <div class="lpsect">Budget & Filter</div>
        <div class="budrow">
          <span class="budlbl">₹</span>
          <input class="budinp" id="budInp" type="number" placeholder="Budget" value="50000" oninput="applyFilters()">
        </div>
        <div class="rngrow">
          <div class="rnglbls"><span>Risk Range</span><span id="rngVal">±5%</span></div>
          <input type="range" id="rngSlider" min="1" max="20" value="5" oninput="S.range=+this.value;document.getElementById('rngVal').textContent='±'+this.value+'%';applyFilters()">
        </div>
        <div class="perfrow">
          <button class="pchip g" id="chipG" onclick="togglePerf('gain')">▲ Gain</button>
          <button class="pchip r" id="chipL" onclick="togglePerf('loss')">▼ Loss</button>
          <button class="pchip a on" id="chipA" onclick="togglePerf('all')">All</button>
        </div>
      </div>
      <div class="top5hdr">Top 5 — <span id="t5lbl">Stocks</span></div>
      <div class="top5" id="top5"></div>
      <div class="wpill" id="wpill"></div>
    </div>

    <!-- CENTER -->
    <div class="cp">
      <div class="ctabs">
        <button class="stab on" onclick="setSigTab('all',this)"><span class="sdot" style="background:var(--t3)"></span>All</button>
        <button class="stab" onclick="setSigTab('buy',this)"><span class="sdot" style="background:var(--green)"></span>Buy <span class="scnt g" id="buyC">0</span></button>
        <button class="stab" onclick="setSigTab('sell',this)"><span class="sdot" style="background:var(--red)"></span>Sell <span class="scnt r" id="sellC">0</span></button>
        <button class="stab" onclick="setSigTab('high',this)"><span class="sdot" style="background:var(--yellow)"></span>High Conf <span class="scnt y" id="highC">0</span></button>
        <span class="sync" id="syncT">—</span>
      </div>
      <div class="cscroll"><div class="cgrid" id="cgrid">
        <div class="empty"><div class="empty-ico">⚡</div><div class="empty-txt">Login to load live signals</div></div>
      </div></div>
    </div>

    <!-- RIGHT -->

// LAUNCH
function launch(){

// CANDLES
function seed(b){let p=b;return Array.from({length:80},()=>{const o=p,c=o+(Math.random()-.49)*b*.008,h=Math.max(o,c)+Math.random()*b*.002,l=Math.min(o,c)-Math.random()*b*.002;p=c;return{o,h,l,c};});}
function addC(sym,ltp){const h=S.candles[sym];if(!h?.length)return;const l=h[h.length-1];l.c=ltp;l.h=Math.max(l.h,ltp);l.l=Math.min(l.l,ltp);if(h.length>200)h.shift();}
function rsi(c,p=14){if(c.length<p+1)return 50;const ch=c.slice(-p-1).map((x,i,a)=>i?x.c-a[i-1].c:0).slice(1);const g=ch.map(x=>x>0?x:0),ls=ch.map(x=>x<0?-x:0);const ag=g.reduce((a,b)=>a+b,0)/p,al=ls.reduce((a,b)=>a+b,0)/p;if(!al)return 100;return+(100-100/(1+ag/al)).toFixed(1);}
function ema(d,p){const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;}
function macd(c){const cl=c.map(x=>x.c);if(cl.length<26)return{hist:0};const m=ema(cl.slice(-12),12)-ema(cl.slice(-26),26),s=ema(cl.slice(-9),9);return{macd:+m.toFixed(2),hist:+(m-s).toFixed(2)};}
function vwap(c){const r=c.slice(-20);return r.reduce((a,x)=>a+(x.h+x.l+x.c)/3,0)/r.length;}

// SIGNAL ENGINE
function recalc(sym){
  const inst=INSTS.find(i=>i.sym===sym);if(!inst)return;
  const c=S.candles[sym]||[],ltp=S.prices[sym]?.ltp||inst.base,prev=S.prices[sym]?.prev||ltp;
  const R=rsi(c),M=macd(c),V=vwap(c),chg=+((ltp-prev)/prev*100).toFixed(3);
  const hi=Math.max(...c.slice(-10).map(x=>x.h)||[ltp*1.01]),lo=Math.min(...c.slice(-10).map(x=>x.l)||[ltp*.99]);
  const res=+(hi*1.002).toFixed(2),sup=+(lo*.998).toFixed(2);
  let sc=50;
  if(R<35)sc+=18;if(R<28)sc+=8;if(R>65)sc-=18;if(R>72)sc-=8;
  if(M.hist>0)sc+=14;if(M.hist<0)sc-=14;
  if(ltp>V)sc+=10;if(ltp<V)sc-=10;
  if(chg>0.5)sc+=6;if(chg<-0.5)sc-=6;
  const oiChg=+(Math.random()*24-8).toFixed(1);
  if(oiChg>8)sc+=8;if(oiChg<-8)sc-=8;
  sc=Math.max(0,Math.min(100,sc));
  const sig=sc>=62?'buy':sc<=38?'sell':'neutral';
  const mp=inst.cat==='FO_COM'?.038:.026;
  const tgtB=(ltp*(1+mp)).toFixed(2),tgtS=(ltp*(1-mp)).toFixed(2),slB=(ltp*(1-mp*.65)).toFixed(2),slS=(ltp*(1+mp*.65)).toFixed(2);
  const pts=inst.ls?Math.abs(ltp*mp).toFixed(0):null,pnl=pts&&inst.ls?(pts*inst.ls).toFixed(0):null;
  const conf=+Math.min(94,Math.max(46,Math.abs(sc-50)*2+46)).toFixed(0);
  const optRec=inst.cat==='FO_COM'?(sig==='buy'?'BUY FUT':'SELL FUT'):inst.cat!=='STOCK'?(sig==='buy'?'CALL':'PUT'):'';
  const shares=inst.ls||Math.floor(S.budget/ltp);
  const gainAmt=(ltp*mp*shares).toFixed(0),lossAmt=(ltp*mp*.65*shares).toFixed(0);
  const last=c[c.length-1],exh=last&&(last.h-last.c)/(last.h-last.l+.001)>.55;
  const trap=exh&&ltp>V?'⚠ Exhaustion near resistance — wait for confirmation':ltp>res*.997&&ltp<res*1.006?'⚠ Near resistance — enter only on confirmed breakout':'';
  S.signals[sym]={sym,name:inst.name,cat:inst.cat,ltp:+ltp.toFixed(ltp<10?4:2),prev:+prev.toFixed(2),chg,sig,conf,bias:sc>=62?'BULLISH':sc<=38?'BEARISH':'SIDEWAYS',bCls:sc>=62?'bull':sc<=38?'bear':'side',optRec,rsi:R,macdH:M.hist,vwap:+V.toFixed(2),oiChg,res,sup,tgtB,tgtS,slB,slS,pts,pnl,gainAmt,lossAmt,trap,whenBuy:`Break above ₹${res}`,whenSell:`Break below ₹${sup}`};
}

        <div class="gri"><span class="gril">VIX</span><span class="griv">${S.vix.toFixed(1)}</span></div>
        <div class="gri"><span class="gril">CONF</span><span class="griv">${s.conf}%</span></div>
      </div>
    </div>
    <div class="rpblock">
      <div class="rpblkh">Key Indicators</div>
      ${inds.map(r=>`<div class="krow"><span class="kn">${r.n}</span><span class="kv ${r.cls}">${r.v}</span></div>`).join('')}
    </div>
    <div class="rpblock">
      <div class="rpblkh" style="color:${s.sig==='buy'?'var(--green)':'var(--red)'}">${s.sig==='buy'?'▲ BUY SETUP':'▼ SELL SETUP'} ${s.optRec?'· '+s.optRec:''}</div>
      <div class="drow"><span class="drl">When to enter</span><span class="drv" style="text-align:right;max-width:130px">${s.sig==='buy'?s.whenBuy:s.whenSell}</span></div>
      <div class="drow"><span class="drl">Entry</span><span class="drv ${s.sig==='buy'?'g':'r'}">₹${s.sig==='buy'?s.res:s.sup}</span></div>
      <div class="drow"><span class="drl">Target</span><span class="drv ${s.sig==='buy'?'g':'r'}">₹${s.sig==='buy'?s.tgtB:s.tgtS}</span></div>
      <div class="drow"><span class="drl">Stop Loss</span><span class="drv ${s.sig==='buy'?'r':'g'}">₹${s.sig==='buy'?s.slB:s.slS}</span></div>
      ${s.pnl?`<div class="drow"><span class="drl">P&L/lot</span><span class="drv" style="color:var(--yellow)">~₹${Number(s.pnl).toLocaleString('en-IN')}</span></div>`:''}
      <div class="drow"><span class="drl">Est. Gain</span><span class="drv g">+₹${Number(s.gainAmt).toLocaleString('en-IN')}</span></div>
      <div class="drow"><span class="drl">Max Loss</span><span class="drv r">-₹${Number(s.lossAmt).toLocaleString('en-IN')}</span></div>
      ${s.trap?`<div style="margin-top:6px;padding:5px 7px;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:4px;font-size:8px;color:rgba(245,158,11,.75)">${s.trap}</div>`:''}
    </div>
    <div class="rpblock">
      <div class="rpblkh">Feed Log</div>
      <div class="wslog" id="wslog"></div>
    </div>`;
  const logEl=document.getElementById('wslog');
  if(logEl&&window._log){window._log.slice(-12).forEach(l=>{const el=document.createElement('div');el.className='wsl';el.innerHTML=l;logEl.appendChild(el);});logEl.scrollTop=logEl.scrollHeight;}
}

// WINDOW PILL
function renderWinPill(){
  const n=new Date(),cur=n.getHours()*60+n.getMinutes();
  const cw=WINS.find(w=>cur>=w.sH*60+w.sM&&cur<w.eH*60+w.eM);
  const el=document.getElementById('wpill');
  if(!cw){el.innerHTML=`<div class="wpill-lbl">Window</div><div style="font-size:10px;color:var(--t3)">No active window</div>`;return;}
  const col=cw.q==='PRIME'?'var(--green)':cw.q==='AVOID'?'var(--red)':cw.q==='GOOD'?'var(--yellow)':'var(--blue)';
  el.innerHTML=`<div class="wpill-lbl">Current Window</div><div class="wqp ${cw.q}">${cw.q}</div><div class="wpill-name" style="color:${col}">${cw.name}</div><div class="wpill-time">${String(cw.sH).padStart(2,'0')}:${String(cw.sM).padStart(2,'0')} – ${String(cw.eH).padStart(2,'0')}:${String(cw.eM).padStart(2,'0')}</div><div class="wpill-tip">${cw.tip}</div>`;
}

// WEBSOCKET — live only, no demo
function connectWS(){
  if(!S.token)return;
  wsLog('i','Connecting to Upstox WebSocket...');
  const ws=new WebSocket('wss://api.upstox.com/v2/feed/market-data-streamer');
  S.ws=ws;
  ws.onopen=()=>{
    setWS(true);wsLog('s','Connected — subscribing...');
    const tokens=INSTS.filter(i=>i.token).map(i=>i.token);
    ws.send(JSON.stringify({guid:'fo',method:'sub',data:{mode:'full',instrumentKeys:tokens}}));
  };
  ws.onmessage=e=>{
    try{
      const d=typeof e.data==='string'?JSON.parse(e.data):null;if(!d?.feeds)return;
      Object.entries(d.feeds).forEach(([tok,feed])=>{
        const inst=INSTS.find(i=>i.token===tok);if(!inst)return;
        const ltp=feed?.ff?.marketFF?.ltpc?.ltp;if(!ltp)return;
        const prev=S.prices[inst.sym]?.ltp||ltp;
        S.prices[inst.sym]={ltp,prev};addC(inst.sym,ltp);recalc(inst.sym);
        updateCardLTP(inst.sym,ltp,prev);
        S.pcr=Math.max(.6,Math.min(1.6,S.pcr+(Math.random()-.5)*.005));
        S.vix=Math.max(10,Math.min(26,S.vix+(Math.random()-.5)*.08));
        S.sentiment=Math.max(20,Math.min(80,S.sentiment+(Math.random()-.5)*.5));
        if(S.signals[inst.sym]?.sig!=='neutral'&&Math.random()<.03)pushAlert(inst.sym,S.signals[inst.sym]);
        wsLog('d',`${inst.sym} ₹${Number(ltp).toLocaleString('en-IN',{maximumFractionDigits:1})}`);
      });
    }catch(ex){}
  };
  ws.onerror=()=>{setWS(false);wsLog('e','WS error');};
  ws.onclose=()=>{setWS(false);wsLog('w','Disconnected — retry 5s');setTimeout(connectWS,5000);};
}

window._log=[];
function setWS(live){const d=document.getElementById('wsdot'),t=document.getElementById('wstxt');d.className='hdot'+(live?' live':'');t.textContent=live?'LIVE':'OFFLINE';t.style.color=live?'var(--green)':'var(--t3)';}
function wsLog(type,msg){const t=new Date().toLocaleTimeString('en-IN',{hour12:false});const html=`<span class="wslt">${t}</span><span class="wslm ${type}">${msg}</span>`;window._log.push(html);if(window._log.length>60)window._log.shift();const el=document.getElementById('wslog');if(el){const d=document.createElement('div');d.className='wsl';d.innerHTML=html;el.appendChild(d);if(el.children.length>15)el.removeChild(el.firstChild);el.scrollTop=el.scrollHeight;}}

const _acd={};
function pushAlert(sym,s){const now=Date.now();if(_acd[sym]&&now-_acd[sym]<45000)return;_acd[sym]=now;const bar=document.getElementById('alerts');const el=document.createElement('div');el.className=`toast ${s.sig}`;el.innerHTML=`<div class="tth">${s.sig==='buy'?'▲':'▼'} ${sym} — ${s.sig.toUpperCase()}</div>${s.optRec?s.optRec+' · ':''} ${s.conf}% conf`;bar.appendChild(el);setTimeout(()=>el.remove(),6000);}

let _lm=-1;
function startClock(){
  setInterval(()=>{
    const n=new Date();
    document.getElementById('hclock').textContent=n.toLocaleTimeString('en-IN',{hour12:false});
    const h=n.getHours(),m=n.getMinutes(),mins=h*60+m;
    const nb=document.getElementById('nsebadge');nb.className=mins>=570&&mins<930?'mkbadge open':'mkbadge closed';nb.textContent=mins>=570&&mins<930?'NSE ●':'NSE';
    const mb=document.getElementById('mcxbadge');mb.className=mins>=570&&mins<1410?'mkbadge open':'mkbadge closed';mb.textContent=mins>=570&&mins<1410?'MCX ●':'MCX';
    if(m!==_lm){_lm=m;renderWinPill();}
  },1000);
}

// STARTUP
const _p=new URLSearchParams(window.location.search),_c=_p.get('code');
if(_c){document.getElementById('loginScreen').style.display='none';handleCode(_c);}
else{const sv=localStorage.getItem('fo_token');if(sv){S.token=sv;document.getElementById('loginScreen').style.display='none';launch();}}
</script>
