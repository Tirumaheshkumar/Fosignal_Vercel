<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FO Signals — Auth Debug</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#02040a;color:#90b8d8;font-family:'JetBrains Mono',monospace;font-size:12px;padding:30px;}
h1{color:#00ff88;font-size:16px;margin-bottom:20px;letter-spacing:2px;}
.box{background:#060c18;border:1px solid #162840;border-radius:10px;padding:18px;margin-bottom:14px;}
.label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a80a8;margin-bottom:8px;}
.val{color:#d8eeff;word-break:break-all;line-height:1.7;}
.ok{color:#00ff88;}.err{color:#ff1a44;}.warn{color:#ffd000;}
button{background:#00ff88;color:#000;border:none;padding:10px 20px;border-radius:7px;font-family:monospace;font-weight:700;cursor:pointer;margin-top:10px;margin-right:8px;}
button.sec{background:transparent;color:#90b8d8;border:1px solid #162840;}
pre{white-space:pre-wrap;word-break:break-all;font-size:10px;line-height:1.6;margin-top:6px;}
</style>
</head>
<body>
<h1>FO SIGNALS — AUTH DEBUGGER</h1>

<div class="box">
  <div class="label">URL Received</div>
  <div class="val" id="urlDisplay"></div>
</div>

<div class="box">
  <div class="label">Auth Code from Upstox</div>
  <div class="val" id="codeDisplay"></div>
</div>

<div class="box">
  <div class="label">Token Exchange Result</div>
  <div class="val" id="tokenResult">waiting...</div>
</div>

<div class="box">
  <div class="label">What to check</div>
  <div class="val" id="checklist"></div>
</div>

<div style="margin-top:16px">
  <button onclick="retry()">Retry Token Exchange</button>
  <button class="sec" onclick="window.location.href='/'">Back to App</button>
  <button class="sec" onclick="localStorage.removeItem('fo_token');alert('Cleared')">Clear Token</button>
</div>

<script>
let CODE = null;

function run(){
  const full = window.location.href;
  document.getElementById('urlDisplay').innerHTML =
    '<span class="ok">Full URL:</span> ' + full;

  const params = new URLSearchParams(window.location.search);
  CODE = params.get('code');
  const error = params.get('error');

  if(error){
    document.getElementById('codeDisplay').innerHTML =
      '<span class="err">Upstox returned error: ' + error + '</span>';
  } else if(CODE){
    document.getElementById('codeDisplay').innerHTML =
      '<span class="ok">Code found (' + CODE.length + ' chars): ' + CODE.slice(0,30) + '...</span>';
    exchange(CODE);
  } else {
    document.getElementById('codeDisplay').innerHTML =
      '<span class="err">NO CODE in URL. Upstox did not redirect here correctly.</span>';
  }

  document.getElementById('checklist').innerHTML =
    '1. Upstox Redirect URL must be: <b style="color:#00d4ff">' + window.location.origin + '/callback</b><br>' +
    '2. Vercel env UPSTOX_REDIRECT_URI must match exactly<br>' +
    '3. After login, URL should show ?code=XXXX here';
}

async function exchange(code){
  document.getElementById('tokenResult').innerHTML = '<span class="warn">Calling /api/upstox-token...</span>';
  try{
    const r = await fetch('/api/upstox-token', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });
    const text = await r.text();
    let data;
    try{ data = JSON.parse(text); }catch(e){ data = {raw_response: text}; }

    if(data.access_token){
      localStorage.setItem('fo_token', data.access_token);
      document.getElementById('tokenResult').innerHTML =
        '<span class="ok">SUCCESS! Token saved. Redirecting...</span>';
      setTimeout(()=>window.location.href='/', 1500);
    } else {
      document.getElementById('tokenResult').innerHTML =
        '<span class="err">FAILED (HTTP ' + r.status + '):</span><pre>' +
        JSON.stringify(data,null,2) + '</pre>' +
        '<br><span class="warn">Check your Vercel env vars match Upstox portal exactly.</span>';
    }
  }catch(e){
    document.getElementById('tokenResult').innerHTML =
      '<span class="err">Fetch error: ' + e.message + '</span>';
  }
}

function retry(){ if(CODE) exchange(CODE); }

run();
</script>
</body>
</html>
