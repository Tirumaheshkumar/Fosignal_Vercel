<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FO Signals — Connecting...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#02040a;color:#90b8d8;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;}
.logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#00ff88,#1a8fff);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:18px;font-weight:900;color:#000;letter-spacing:1px;}
.title{font-size:20px;color:#d8eeff;letter-spacing:2px;}
.msg{font-size:11px;color:#5a80a8;}
.spinner{width:32px;height:32px;border:2px solid #0d1e34;border-top:2px solid #00ff88;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#ff1a44;font-size:11px;max-width:340px;text-align:center;line-height:1.7;padding:12px 16px;background:rgba(255,26,68,.07);border:1px solid rgba(255,26,68,.2);border-radius:8px;}
</style>
</head>
<body>
<div class="logo">FO</div>
<div class="title">FO SIGNALS</div>
<div class="spinner" id="spin"></div>
<div class="msg" id="msg">Completing login...</div>
<div class="err" id="err" style="display:none"></div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  if(error){
    document.getElementById('spin').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Upstox login error: ' + error + '. Please close this and try again.';
    return;
  }

  if(!code){
    document.getElementById('spin').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='No auth code received from Upstox. Please try logging in again.';
    setTimeout(()=>window.location.href='/',2000);
    return;
  }

  // Store code temporarily and redirect to main app
  // Use sessionStorage so main app can pick it up
  try {
    sessionStorage.setItem('upstox_auth_code', code);
    document.getElementById('msg').textContent='Login successful — loading terminal...';
    // Redirect to main app — it will read the code from sessionStorage
    window.location.href = '/';
  } catch(e) {
    // sessionStorage blocked — pass via URL directly
    window.location.href = '/?code=' + encodeURIComponent(code);
  }
})();
</script>
</body>
</html>
