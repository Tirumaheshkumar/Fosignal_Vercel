<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FO Signals — Connecting</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#02040a;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px;padding:20px;}
.mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#00ff88,#1a8fff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000;}
.title{font-size:18px;color:#d8eeff;letter-spacing:3px;}
.msg{font-size:11px;color:#5a80a8;text-align:center;max-width:380px;line-height:1.8;}
.spin{width:28px;height:28px;border:2px solid #0d1e34;border-top:2px solid #00ff88;border-radius:50%;animation:s .8s linear infinite;}
@keyframes s{to{transform:rotate(360deg)}}
.err{color:#ff1a44;font-size:11px;max-width:440px;text-align:left;line-height:1.9;padding:14px 18px;background:rgba(255,26,68,.07);border:1px solid rgba(255,26,68,.2);border-radius:8px;font-family:monospace;}
.ok{color:#00ff88;}
button{background:#00ff88;color:#000;border:none;padding:10px 22px;border-radius:7px;font-family:monospace;font-weight:700;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>
<div class="mark">FO</div>
<div class="title">FO SIGNALS</div>
<div class="spin" id="spin"></div>
<div class="msg" id="msg">Completing Upstox login...</div>
<div id="extra"></div>

<script>
(async function(){
  const p = new URLSearchParams(window.location.search);
  const code = p.get('code');
  const err  = p.get('error');

  const $spin = document.getElementById('spin');
  const $msg  = document.getElementById('msg');
  const $ext  = document.getElementById('extra');

  function ok(t){ $spin.style.display='none'; $msg.innerHTML='<span class="ok">✅ '+t+'</span>'; }
  function fail(title, detail){
    $spin.style.display='none';
    $msg.innerHTML='<span style="color:#ff1a44">❌ '+title+'</span>';
    $ext.innerHTML=(detail?'<div class="err">'+detail+'</div>':'')+'<button onclick="location.href=\'/\'">← Back to Login</button>';
  }

  if(err){ fail('Upstox error: '+err); return; }

  if(!code){
    fail('No auth code received',
      'Your Upstox app <b>Redirect URL</b> must be set to:<br>'+
      '<b style="color:#00d4ff">'+location.origin+'/callback</b><br><br>'+
      'Go to developer.upstox.com → your app → edit → update Redirect URL');
    return;
  }

  $msg.textContent = 'Exchanging code for access token...';

  try {
    const r = await fetch('/api/upstox-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });

    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { data = { raw: text }; }

    if(data.access_token){
      localStorage.setItem('fo_token', data.access_token);
      ok('Login successful! Loading terminal...');
      setTimeout(() => location.href = '/', 1000);
    } else if(r.status === 404){
      fail(
        '/api/upstox-token not found (404)',
        'The server function is missing. Fix your GitHub repo:<br><br>'+
        '1. Make sure <b>api/upstox-token.js</b> exists at the root of your repo<br>'+
        '2. Check Vercel → Settings → General → <b>Root Directory</b> is empty/blank<br>'+
        '3. Check Vercel → Functions tab shows upstox-token<br><br>'+
        'Then redeploy and try again.'
      );
    } else {
      fail(
        'Token exchange failed (HTTP '+r.status+')',
        '<b>Response:</b> '+JSON.stringify(data, null, 2).slice(0, 300)+'<br><br>'+
        'Check Vercel → Settings → Environment Variables:<br>'+
        '• UPSTOX_API_KEY<br>• UPSTOX_API_SECRET<br>'+
        '• UPSTOX_REDIRECT_URI = '+location.origin+'/callback'
      );
    }
  } catch(e) {
    fail('Network error: '+e.message);
  }
})();
</script>
</body>
</html>
